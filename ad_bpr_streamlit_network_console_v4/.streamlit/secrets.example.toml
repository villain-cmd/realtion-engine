# Copy this file to .streamlit/secrets.toml locally, or register the same
# values in Streamlit Community Cloud Secrets. Never commit real credentials.

[google_sheets]
spreadsheet_id = "YOUR_SPREADSHEET_ID"

[gcp_service_account]
type = "service_account"
project_id = "YOUR_PROJECT_ID"
private_key_id = "YOUR_PRIVATE_KEY_ID"
private_key = "-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----\n"
client_email = "relation-engine@YOUR_PROJECT_ID.iam.gserviceaccount.com"
client_id = "YOUR_CLIENT_ID"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "YOUR_CLIENT_CERT_URL"
universe_domain = "googleapis.com"

[ga4]
property_id = "123456789"

[google_ads]
customer_id = "1234567890"
login_customer_id = "1234567890"
developer_token = "YOUR_DEVELOPER_TOKEN"
client_id = "YOUR_OAUTH_CLIENT_ID"
client_secret = "YOUR_OAUTH_CLIENT_SECRET"
refresh_token = "YOUR_REFRESH_TOKEN"

[airregi]
# Airレジの連携先システム向け仕様で案内された値を設定します。
base_url = "https://YOUR-AIRREGI-DATA-INTEGRATION-ENDPOINT/"
transactions_path = "YOUR_TRANSACTIONS_PATH"
api_key = "YOUR_API_KEY"
api_token = "YOUR_API_TOKEN"
api_key_header = "X-API-Key"
api_token_header = "Authorization"
api_token_prefix = "Bearer "
start_date_param = "start_date"
end_date_param = "end_date"
cursor_param = "cursor"

